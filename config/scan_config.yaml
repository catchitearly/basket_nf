# ---------------------------------------------------------------------------
# Combo scanner configuration
# ---------------------------------------------------------------------------
underlying_symbol: "NSE:NIFTY50-INDEX"

strikes:
  start: 23500
  end: 24500
  step: 100

expiries:
  near:
    code: "26JUN"        # symbol fragment used to build the Fyers symbol
    date: "2026-06-25"   # actual calendar expiry date (needed for time-to-expiry in Greeks) -- CONFIRM this is correct
  far:
    code: "26707"        # symbol fragment used to build the Fyers symbol
    date: "2026-07-07"   # actual calendar expiry date -- CONFIRM this is correct

# Fyers option symbol = NSE:NIFTY{expiry_code}{strike}{CE|PE}
# e.g. NSE:NIFTY26JUN23500CE   /   NSE:NIFTY2670723500PE

dates:
  - "2026-06-22"
  - "2026-06-23"
  - "2026-06-24"
  - "2026-06-25"
  - "2026-06-30"

resolution: "5"          # 5-minute candles
risk_free_rate: 0.065    # annualized, used in Black-Scholes
square_off_time: "15:15" # IST, intraday exit

# Strike selection: at every 5-min candle we re-locate ATM (closest strike
# to spot) and/or ITM1 (one strike in-the-money) and build the calendar
# combo AT THAT STRIKE ONLY -- not a scan across the whole strike range.
strike_modes: ["ATM", "ITM1"]   # which strike rule(s) to evaluate each candle
option_types: ["CE"]            # CE only per current strategy (buy far CE / sell near CE)

# Ratio search: instead of solving for zero net premium, we now search
# every (far_lots, near_lots) pair up to max_ratio_leg and pick the one
# that MAXIMIZES net theta subject to BOTH risk caps below.
max_ratio_leg: 6
delta_neutral_band: 0.30   # |net delta|, in lots-equivalent units (far_lots*far_delta - near_lots*near_delta)
gamma_band: 0.05           # |net gamma|, same lots-equivalent convention -- caps the "risk accelerates fast" exposure
require_positive_theta: true

lot_size: 75
