# ---------------------------------------------------------------------------
# Basket definition
# ---------------------------------------------------------------------------
# date_range: the historical window to compute P&L over (used for the
#             "range_from"/"range_to" params of the Fyers history API).
# resolution: candle size in minutes (e.g. "1", "5", "15", "60", "D").
#
# Each leg:
#   fyers_symbol : exact Fyers symbol, e.g. "NSE:NIFTY25D2623500CE"
#                  (use the Fyers symbol master / scrip lookup to get this
#                  exactly right for each strike+expiry+CE/PE combination)
#   side          : BUY or SELL
#   lots          : number of lots
#   lot_size      : contract lot size (Nifty = 75 as of 2026, but you can
#                   override per leg if it ever changes)
#   entry_price   : optional. If omitted, the script uses the close price
#                   of the first available candle in the date range as the
#                   entry price (useful for "what if I had entered at open").
# ---------------------------------------------------------------------------

date_range:
  from: "2026-07-15"
  to: "2026-07-15"

resolution: "5"   # 5-minute candles

legs:
  - name: "Leg1 - Sell 23700 PE"
    fyers_symbol: "NSE:NIFTY2672123700PE"
    side: SELL
    lots: 1
    lot_size: 65
    entry_price: null
    
  - name: "Leg1 - Sell 23550 PE"
    fyers_symbol: "NSE:NIFTY2672123550PE"
    side: BUY
    lots: 1
    lot_size: 65
    entry_price: null

  - name: "Leg1 - Sell 24700 CE"
    fyers_symbol: "NSE:NIFTY2672124700CE"
    side: SELL
    lots: 1
    lot_size: 65
    entry_price: null
    
  - name: "Leg1 - Sell 24850 PE"
    fyers_symbol: "NSE:NIFTY2672124850CE"
    side: BUY
    lots: 1
    lot_size: 65
    entry_price: null

