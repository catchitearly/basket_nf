name: Scan Calendar Ratio Combos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch option chain candles
        env:
          FYERS_TOKEN: ${{ secrets.FYERS_TOKEN }}
        run: python scripts/fetch_chain.py

      - name: Scan combos and backtest
        run: python scripts/scan_combos.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candles_cache.json data/scan_results.json docs/scan_results.json
          git diff --staged --quiet || git commit -m "Update combo scan results [skip ci]"
          git push
