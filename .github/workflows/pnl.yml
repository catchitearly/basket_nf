name: Compute Basket P&L

on:
  workflow_dispatch:
    inputs:
      basket_config:
        description: "Path to basket config file"
        required: false
        default: "config/basket.yaml"

permissions:
  contents: write

jobs:
  compute-pnl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute P&L
        env:
          FYERS_TOKEN: ${{ secrets.FYERS_TOKEN }}
          BASKET_CONFIG: ${{ github.event.inputs.basket_config }}
        run: python scripts/compute_pnl.py

      - name: Commit and push updated P&L data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pnl_timeseries.json
          git diff --staged --quiet || git commit -m "Update P&L data [skip ci]"
          git push
