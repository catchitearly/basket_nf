<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendar Ratio Scan — Nifty Options</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0b0e11; --panel:#11161c; --line:#1f2730; --text:#d7dde3; --muted:#7c8895;
    --accent:#ffb454; --green:#2fd06a; --red:#ff5c5c;
    --mono:"IBM Plex Mono",Consolas,monospace; --sans:Inter,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); }
  header { padding:28px 32px 18px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:20px; font-weight:600; }
  header h1 span { color:var(--accent); }
  header p { margin:6px 0 0; color:var(--muted); font-family:var(--mono); font-size:12px; }
  main { padding:24px 32px 48px; }
  .day-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .day-tab {
    font-family:var(--mono); font-size:12px; padding:8px 14px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); cursor:pointer; border-radius:4px;
  }
  .day-tab.active { color:var(--accent); border-color:var(--accent); }
  .panel { background:var(--panel); border:1px solid var(--line); padding:20px; margin-bottom:20px; }
  .panel h2 { margin:0 0 14px; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.5px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:500; text-transform:uppercase; font-size:10.5px; }
  .pos { color:var(--green); } .neg { color:var(--red); }
  .empty { color:var(--muted); font-family:var(--mono); font-size:13px; padding:30px; text-align:center; }
  canvas { max-height:360px; }
</style>
</head>
<body>
<header>
  <h1>Calendar Ratio <span>Scan</span> — Buy Far / Sell Near, Zero-Cost Ratio</h1>
  <p id="meta">loading…</p>
</header>
<main>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="panel">
    <h2>Best Combo This Day</h2>
    <table id="bestTable"><tbody></tbody></table>
  </div>
  <div class="panel">
    <h2>P&amp;L From Entry To Square-Off</h2>
    <canvas id="pnlChart"></canvas>
  </div>
  <div class="panel">
    <h2>All Qualifying Candidates (top 20)</h2>
    <table id="candTable">
      <thead><tr><th>Time</th><th>Strike</th><th>Mode</th><th>Type</th><th>Ratio (far:near)</th><th>Net Cost</th><th>Net Δ</th><th>Net Γ</th><th>Net Θ</th><th>Score</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<script>
let DATA = null;
let chartInstance = null;

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleString("en-IN", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
}
function fmtMoney(v) {
  const sign = v < 0 ? "-" : "";
  return sign + "₹" + Math.abs(v).toLocaleString("en-IN", { maximumFractionDigits: 0 });
}

async function load() {
  try {
    const res = await fetch("scan_results.json", { cache: "no-store" });
    if (!res.ok) throw new Error();
    DATA = await res.json();
    render();
  } catch (e) {
    document.querySelector("main").innerHTML = `<div class="empty">No scan results yet. Run the "Scan Calendar Ratio Combos" GitHub Action.</div>`;
    document.getElementById("meta").textContent = "no data";
  }
}

function render() {
  document.getElementById("meta").textContent =
    `Strikes ${DATA.config.strikes.start}-${DATA.config.strikes.end} · near ${DATA.config.expiries.near.code} (${DATA.config.expiries.near.date}) · far ${DATA.config.expiries.far.code} (${DATA.config.expiries.far.date}) · generated ${new Date(DATA.generated_at).toLocaleString("en-IN")}`;

  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = DATA.results.map((r, i) =>
    `<div class="day-tab ${i===0?"active":""}" data-i="${i}">${r.date}</div>`).join("");
  tabs.querySelectorAll(".day-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.querySelectorAll(".day-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      renderDay(DATA.results[+tab.dataset.i]);
    });
  });

  renderDay(DATA.results[0]);
}

function renderDay(day) {
  const bestBody = document.querySelector("#bestTable tbody");
  if (!day.best) {
    bestBody.innerHTML = `<tr><td colspan="2">No qualifying delta-neutral / positive-theta combo found for ${day.date}.</td></tr>`;
  } else {
    const b = day.best;
    bestBody.innerHTML = `
      <tr><td>Strike / Type</td><td>${b.strike} ${b.option_type} (${b.strike_mode})</td></tr>
      <tr><td>Ratio (buy far : sell near)</td><td>${b.far_lots} : ${b.near_lots}</td></tr>
      <tr><td>Entry time</td><td>${fmtTime(b.ts)}</td></tr>
      <tr><td>Spot at entry</td><td>${b.spot}</td></tr>
      <tr><td>Far / Near entry price</td><td>${b.far_price.toFixed(2)} / ${b.near_price.toFixed(2)}</td></tr>
      <tr><td>Net cost (per share, +debit/-credit)</td><td>${b.net_cost}</td></tr>
      <tr><td>Net delta</td><td>${b.net_delta}</td></tr>
      <tr><td>Net gamma</td><td>${b.net_gamma}</td></tr>
      <tr><td>Net theta (₹/day equiv)</td><td>${b.net_theta}</td></tr>
      <tr><td>Near IV / Far IV</td><td>${b.near_iv}% / ${b.far_iv}%</td></tr>
      <tr><td>Score (theta/vega)</td><td>${b.score.toFixed(3)}</td></tr>
    `;
  }

  const curve = day.pnl_curve || [];
  const labels = curve.map(p => fmtTime(p.ts));
  const totals = curve.map(p => p.total);
  const finalPnl = totals.length ? totals[totals.length - 1] : 0;

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById("pnlChart"), {
    type: "line",
    data: { labels, datasets: [{
      label: "Combo P&L",
      data: totals,
      borderColor: finalPnl >= 0 ? "#2fd06a" : "#ff5c5c",
      backgroundColor: finalPnl >= 0 ? "rgba(47,208,106,0.08)" : "rgba(255,92,92,0.08)",
      borderWidth: 2, pointRadius: 0, fill: true, tension: 0.15,
    }]},
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: "#d7dde3" } },
        tooltip: { callbacks: { label: (ctx) => fmtMoney(ctx.parsed.y) } } },
      scales: {
        x: { ticks: { color: "#7c8895", maxTicksLimit: 8, font:{size:10} }, grid:{color:"#1f2730"} },
        y: { ticks: { color: "#7c8895", font:{size:10} }, grid:{color:"#1f2730"} }
      }
    }
  });

  const candBody = document.querySelector("#candTable tbody");
  const cands = day.candidates || [];
  candBody.innerHTML = cands.length ? cands.map(c => `
    <tr>
      <td>${fmtTime(c.ts)}</td>
      <td>${c.strike}</td>
      <td>${c.strike_mode}</td>
      <td>${c.option_type}</td>
      <td>${c.far_lots}:${c.near_lots}</td>
      <td>${c.net_cost}</td>
      <td>${c.net_delta}</td>
      <td>${c.net_gamma}</td>
      <td class="${c.net_theta > 0 ? 'pos':'neg'}">${c.net_theta}</td>
      <td>${c.score.toFixed(3)}</td>
    </tr>`).join("") : `<tr><td colspan="10">No candidates.</td></tr>`;
}

load();
</script>
</body>
</html>
