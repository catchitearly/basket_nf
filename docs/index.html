<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Basket P&amp;L — Nifty Options</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0b0e11;
    --panel: #11161c;
    --line: #1f2730;
    --text: #d7dde3;
    --muted: #7c8895;
    --accent: #ffb454;
    --green: #2fd06a;
    --red: #ff5c5c;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  header {
    padding: 28px 32px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--accent); }
  header .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--line);
    margin: 24px 32px 0;
    border: 1px solid var(--line);
  }
  .card {
    background: var(--panel);
    padding: 16px 18px;
  }
  .card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card .value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
  }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  main { padding: 24px 32px 48px; }

  .chart-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-panel h2 {
    margin: 0 0 16px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
  }
  canvas { max-height: 420px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  th {
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .legend-swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-right: 8px;
    border-radius: 2px;
    vertical-align: middle;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
  }
  footer {
    padding: 16px 32px 40px;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
  }
</style>
</head>
<body>

<header>
  <h1>Basket <span>P&amp;L</span> — Nifty Options</h1>
  <div class="meta" id="meta-info">loading data…</div>
</header>

<div class="summary" id="summary-cards"></div>

<main>
  <div class="chart-panel">
    <h2>Total P&amp;L vs Time</h2>
    <canvas id="totalChart"></canvas>
  </div>

  <div class="chart-panel">
    <h2>Per-Leg P&amp;L vs Time</h2>
    <canvas id="legChart"></canvas>
  </div>

  <div class="chart-panel">
    <h2>Leg Details</h2>
    <table id="legTable">
      <thead>
        <tr><th>Leg</th><th>Symbol</th><th>Side</th><th>Lots</th><th>Entry Price</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</main>

<footer id="footer-info"></footer>

<script>
const PALETTE = ["#ffb454", "#5ec8ff", "#ff5c5c", "#2fd06a", "#c792ea", "#ffe066", "#ff9ec4", "#7fdbca"];

function fmtMoney(v) {
  const sign = v < 0 ? "-" : "";
  return sign + "₹" + Math.abs(v).toLocaleString("en-IN", { maximumFractionDigits: 0 });
}

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString("en-IN", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
}

async function loadData() {
  try {
    const res = await fetch("pnl_timeseries.json", { cache: "no-store" });
    if (!res.ok) throw new Error("not found");
    return await res.json();
  } catch (e) {
    return null;
  }
}

function renderEmpty() {
  document.querySelector("main").innerHTML = `
    <div class="empty-state">
      No P&amp;L data found yet.<br/>
      Run the "Compute Basket P&amp;L" GitHub Action (workflow_dispatch) to generate
      <code>docs/pnl_timeseries.json</code>.
    </div>`;
  document.getElementById("meta-info").textContent = "no data";
}

function render(data) {
  const ts = data.timeseries || [];
  if (!ts.length) { renderEmpty(); return; }

  const legNames = data.legs.map(l => l.name);
  const labels = ts.map(p => fmtTime(p.ts));
  const totals = ts.map(p => p.total);

  // --- meta + summary ---
  document.getElementById("meta-info").textContent =
    `${data.date_range.from} → ${data.date_range.to} · ${data.resolution}m candles · generated ${new Date(data.generated_at).toLocaleString("en-IN")}`;

  const finalPnl = totals[totals.length - 1];
  const maxPnl = Math.max(...totals);
  const minPnl = Math.min(...totals);
  const cards = [
    { label: "Current P&L", value: finalPnl },
    { label: "Max P&L", value: maxPnl },
    { label: "Min P&L (Max DD)", value: minPnl },
    { label: "Legs in Basket", value: legNames.length, raw: true },
  ];
  document.getElementById("summary-cards").innerHTML = cards.map(c => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value ${c.raw ? "" : (c.value >= 0 ? "pos" : "neg")}">${c.raw ? c.value : fmtMoney(c.value)}</div>
    </div>`).join("");

  // --- total chart ---
  new Chart(document.getElementById("totalChart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Total P&L",
        data: totals,
        borderColor: finalPnl >= 0 ? "#2fd06a" : "#ff5c5c",
        backgroundColor: (finalPnl >= 0 ? "rgba(47,208,106,0.08)" : "rgba(255,92,92,0.08)"),
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.15,
      }]
    },
    options: chartOptions("Total P&L (₹)")
  });

  // --- per-leg chart ---
  const legDatasets = legNames.map((name, i) => ({
    label: name,
    data: ts.map(p => p.legs[name]),
    borderColor: PALETTE[i % PALETTE.length],
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.15,
  }));

  new Chart(document.getElementById("legChart"), {
    type: "line",
    data: { labels, datasets: legDatasets },
    options: chartOptions("Per-Leg P&L (₹)")
  });

  // --- leg table ---
  const tbody = document.querySelector("#legTable tbody");
  tbody.innerHTML = data.legs.map((l, i) => `
    <tr>
      <td><span class="legend-swatch" style="background:${PALETTE[i % PALETTE.length]}"></span>${l.name}</td>
      <td>${l.symbol}</td>
      <td class="${l.side === "BUY" ? "pos" : "neg"}">${l.side}</td>
      <td>${l.lots} × ${l.lot_size}</td>
      <td>${l.entry_price != null ? l.entry_price.toFixed(2) : "—"}</td>
    </tr>`).join("");

  document.getElementById("footer-info").textContent =
    `Source: Fyers historical data API · ${ts.length} data points`;
}

function chartOptions(yLabel) {
  return {
    responsive: true,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { labels: { color: "#d7dde3", font: { family: "Inter", size: 11 } } },
      tooltip: {
        backgroundColor: "#11161c",
        borderColor: "#1f2730",
        borderWidth: 1,
        titleColor: "#d7dde3",
        bodyColor: "#d7dde3",
        callbacks: { label: (ctx) => `${ctx.dataset.label}: ₹${ctx.parsed.y.toLocaleString("en-IN")}` }
      }
    },
    scales: {
      x: { ticks: { color: "#7c8895", maxTicksLimit: 10, font: { size: 10 } }, grid: { color: "#1f2730" } },
      y: { ticks: { color: "#7c8895", font: { size: 10 } }, grid: { color: "#1f2730" }, title: { display: true, text: yLabel, color: "#7c8895", font: { size: 11 } } }
    }
  };
}

function renderError(msg) {
  document.querySelector("main").innerHTML = `
    <div class="empty-state" style="color:#ff5c5c">
      Dashboard error: ${msg}<br/>
      Open the browser console (F12) for full details.
    </div>`;
}

if (typeof Chart === "undefined") {
  renderError("Chart.js failed to load (CDN may be blocked on this network).");
} else {
  loadData()
    .then(data => {
      if (!data) { renderEmpty(); return; }
      try {
        render(data);
      } catch (err) {
        console.error(err);
        renderError(err.message);
      }
    })
    .catch(err => {
      console.error(err);
      renderError("Could not fetch pnl_timeseries.json.");
    });
}
</script>

</body>
</html>
